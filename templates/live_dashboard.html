<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send It Trading Dashboard</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #00ff00;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        
        h1 { 
            text-align: center; 
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 10px #00ff00;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 10px #00ff00; }
            to { text-shadow: 0 0 20px #00ff00, 0 0 30px #00ff00; }
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #00ff00;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ff00;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .status-dot.offline {
            background: #ff0000;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(0, 255, 0, 0.05);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 30px rgba(0, 255, 0, 0.3);
        }
        
        .card h2 {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #00ff00;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .value {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .subvalue {
            font-size: 1.2em;
            opacity: 0.7;
            margin-top: 5px;
        }
        
        .positive { color: #00ff00; }
        .negative { color: #ff0000; }
        .neutral { color: #ffff00; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
        }
        
        th { 
            color: #00ff00; 
            opacity: 0.8;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9em;
        }
        
        tr:hover {
            background: rgba(0, 255, 0, 0.05);
        }
        
        .logs {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00ff00;
            border-radius: 5px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.85em;
            line-height: 1.6;
        }
        
        .logs::-webkit-scrollbar {
            width: 8px;
        }
        
        .logs::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
        
        .logs::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 0, 0.5);
            border-radius: 4px;
        }
        
        .timestamp {
            text-align: center;
            margin-top: 20px;
            opacity: 0.6;
            font-size: 0.9em;
        }
        
        .conviction-badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 0.75em;
            margin-left: 8px;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            opacity: 0.5;
            font-style: italic;
        }
        
        .error {
            color: #ff0000;
            text-align: center;
            padding: 20px;
        }
        
        .wide-card {
            grid-column: 1 / -1;
        }
        
        .percentage {
            font-size: 0.6em;
            margin-left: 10px;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .value { font-size: 2em; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 SEND IT TRADING DASHBOARD</h1>
        
        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Connecting...</span>
            </div>
            <div class="timestamp">
                Last updated: <span id="timestamp">-</span>
            </div>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>Portfolio Value</h2>
                <div class="value" id="portfolio-value">$0.00</div>
                <div class="subvalue">
                    <span id="total-pl" class="neutral">$0.00</span>
                    <span id="total-pl-pct" class="percentage">(0.00%)</span>
                </div>
            </div>
            
            <div class="card">
                <h2>Cash</h2>
                <div class="value" id="cash">$0.00</div>
                <div class="subvalue">
                    Buying Power: <span id="buying-power">$0.00</span>
                </div>
            </div>
            
            <div class="card">
                <h2>Positions</h2>
                <div class="value" id="position-count">0</div>
                <div class="subvalue">
                    Active trades
                </div>
            </div>
            
            <div class="card">
                <h2>Bot Status</h2>
                <div class="value" id="bot-status" style="font-size: 1.5em;">
                    <span id="bot-status-text">Checking...</span>
                </div>
                <div class="subvalue" id="bot-activity">-</div>
            </div>
        </div>
        
        <div class="card wide-card">
            <h2>Active Positions</h2>
            <div id="positions-container">
                <div class="loading">Loading positions...</div>
            </div>
        </div>
        
        <div class="card wide-card" id="convictions-card" style="display: none;">
            <h2>Conviction Positions</h2>
            <div id="convictions-container"></div>
        </div>
        
        <div class="card wide-card">
            <h2>Recent Activity</h2>
            <div class="logs" id="logs">
                <div class="loading">Loading logs...</div>
            </div>
        </div>
    </div>
    
    <script>
        let updateInterval;
        
        async function updateDashboard() {
            try {
                // Update status indicator
                document.getElementById('status-dot').classList.remove('offline');
                
                // Fetch portfolio data
                const portfolioRes = await fetch('/api/portfolio');
                if (!portfolioRes.ok) throw new Error('Portfolio fetch failed');
                
                const portfolio = await portfolioRes.json();
                
                // Update summary cards
                document.getElementById('portfolio-value').textContent = 
                    '$' + portfolio.portfolio_value.toFixed(2);
                
                document.getElementById('cash').textContent = 
                    '$' + portfolio.cash.toFixed(2);
                
                document.getElementById('buying-power').textContent = 
                    '$' + portfolio.buying_power.toFixed(2);
                
                document.getElementById('position-count').textContent = 
                    portfolio.position_count || 0;
                
                // Update P/L
                const plEl = document.getElementById('total-pl');
                const plPctEl = document.getElementById('total-pl-pct');
                const totalPl = portfolio.total_pl || 0;
                const totalPlPct = portfolio.total_pl_pct || 0;
                
                plEl.textContent = (totalPl >= 0 ? '+$' : '-$') + Math.abs(totalPl).toFixed(2);
                plEl.className = totalPl >= 0 ? 'positive' : 'negative';
                
                plPctEl.textContent = `(${totalPlPct >= 0 ? '+' : ''}${totalPlPct.toFixed(2)}%)`;
                plPctEl.className = 'percentage ' + (totalPlPct >= 0 ? 'positive' : 'negative');
                
                // Update positions table
                const container = document.getElementById('positions-container');
                
                if (portfolio.positions && portfolio.positions.length > 0) {
                    const table = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Symbol</th>
                                    <th>Qty</th>
                                    <th>Value</th>
                                    <th>Entry</th>
                                    <th>Current</th>
                                    <th>P/L</th>
                                    <th>P/L %</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${portfolio.positions.map(p => `
                                    <tr>
                                        <td><strong>${p.symbol}</strong></td>
                                        <td>${p.qty}</td>
                                        <td>$${p.market_value.toFixed(2)}</td>
                                        <td>$${p.avg_entry_price.toFixed(2)}</td>
                                        <td>$${p.current_price.toFixed(2)}</td>
                                        <td class="${p.unrealized_pl >= 0 ? 'positive' : 'negative'}">
                                            ${p.unrealized_pl >= 0 ? '+' : ''}$${p.unrealized_pl.toFixed(2)}
                                        </td>
                                        <td class="${p.unrealized_plpc >= 0 ? 'positive' : 'negative'}">
                                            ${p.unrealized_plpc >= 0 ? '+' : ''}${(p.unrealized_plpc * 100).toFixed(2)}%
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                    container.innerHTML = table;
                } else {
                    container.innerHTML = '<div class="loading">No positions</div>';
                }
                
                // Fetch bot status
                const statusRes = await fetch('/api/status');
                if (statusRes.ok) {
                    const status = await statusRes.json();
                    const statusText = document.getElementById('bot-status-text');
                    const activityText = document.getElementById('bot-activity');
                    
                    if (status.service_running) {
                        statusText.textContent = '🟢 RUNNING';
                        statusText.className = 'positive';
                    } else {
                        statusText.textContent = '🔴 OFFLINE';
                        statusText.className = 'negative';
                    }
                    
                    activityText.textContent = status.last_activity || '-';
                }
                
                // Fetch convictions
                const convictionsRes = await fetch('/api/convictions');
                if (convictionsRes.ok) {
                    const convictionsData = await convictionsRes.json();
                    const convictions = convictionsData.convictions || {};
                    
                    if (Object.keys(convictions).length > 0) {
                        document.getElementById('convictions-card').style.display = 'block';
                        const container = document.getElementById('convictions-container');
                        
                        container.innerHTML = Object.entries(convictions).map(([symbol, conv]) => `
                            <div style="margin: 15px 0; padding: 15px; background: rgba(255, 215, 0, 0.1); border-left: 3px solid #ffd700; border-radius: 5px;">
                                <div><strong style="color: #ffd700; font-size: 1.2em;">${symbol}</strong></div>
                                <div style="margin-top: 8px; opacity: 0.9;">${conv.thesis || 'No thesis'}</div>
                                <div style="margin-top: 8px; font-size: 0.9em; opacity: 0.7;">
                                    Entry: $${conv.entry_price?.toFixed(2) || '?'} | 
                                    Max Pain: $${conv.max_pain_price?.toFixed(2) || '?'} | 
                                    Support: $${conv.support_price?.toFixed(2) || '?'}
                                </div>
                            </div>
                        `).join('');
                    }
                }
                
                // Fetch logs
                const logsRes = await fetch('/api/logs');
                if (logsRes.ok) {
                    const logsData = await logsRes.json();
                    const logsEl = document.getElementById('logs');
                    
                    if (logsData.logs && logsData.logs.length > 0) {
                        logsEl.textContent = logsData.logs.join('\n');
                        // Auto-scroll to bottom
                        logsEl.scrollTop = logsEl.scrollHeight;
                    } else {
                        logsEl.innerHTML = '<div class="loading">No logs yet</div>';
                    }
                }
                
                // Update timestamp
                document.getElementById('timestamp').textContent = 
                    new Date(portfolio.timestamp).toLocaleString();
                
                document.getElementById('status-text').textContent = 'Live • Connected';
                
            } catch (error) {
                console.error('Update failed:', error);
                document.getElementById('status-dot').classList.add('offline');
                document.getElementById('status-text').textContent = 'Offline • Error';
            }
        }
        
        // Update every 10 seconds
        updateInterval = setInterval(updateDashboard, 10000);
        
        // Initial update
        updateDashboard();
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            clearInterval(updateInterval);
        });
    </script>
</body>
</html>
